name: Publish to crates.io

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Read crate name + version
        id: meta
        run: |
          NAME=$(awk -F'"' '/^name/ {print $2; exit}' Cargo.toml)
          VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            -H "User-Agent: matmat-publish-workflow" \
            "https://crates.io/api/v1/crates/${{ steps.meta.outputs.name }}/${{ steps.meta.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "Version ${{ steps.meta.outputs.version }} finns redan på crates.io — hoppar över."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publicerar ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }} (API-svar: $STATUS)."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (sanity check)
        if: steps.check.outputs.publish == 'true'
        run: cargo build --release

      - name: Publish
        if: steps.check.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Säkerhetsnät: om check-steget missar att versionen redan finns
          # (t.ex. crates.io-API:t svarade inte 200) ska "already exists"-felet
          # inte göra jobbet rött.
          set +e
          output=$(cargo publish 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ]; then
            if echo "$output" | grep -q "already exists on crates.io index"; then
              echo "Version finns redan på crates.io — hoppar över."
              exit 0
            fi
            exit $status
          fi
